      <stop offset="0" stop-color="#f35f5b"/>
      <stop offset="0.52" stop-color="#d94763"/>
      <stop offset="1" stop-color="#553c8b"/>
    </linearGradient>
    <linearGradient id="panel" x1="106" x2="406" y1="96" y2="428" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fffdf4"/>
      <stop offset="1" stop-color="#f2ead7"/>
    </linearGradient>
    <linearGradient id="tileHot" x1="136" x2="376" y1="134" y2="376" gradientUnits="userSpaceOnUse">
